<svg xmlns="http://www.w3.org/2000/svg" width="420" height="720" viewBox="0 0 420 720" role="img" aria-label="PipNest Markets trader dashboard install preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06142d"/>
      <stop offset=".52" stop-color="#0b2a68"/>
      <stop offset="1" stop-color="#071126"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="420" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="360" cy="92" r="132" fill="#2563eb" opacity=".22"/>
  <circle cx="24" cy="548" r="180" fill="#38bdf8" opacity=".13"/>
  <g opacity=".12" stroke="#ffffff">
    <path d="M34 112h352M34 188h352M34 264h352M34 340h352M34 416h352M34 492h352M34 568h352"/>
    <path d="M72 58v604M148 58v604M224 58v604M300 58v604"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="34" y="36" width="352" height="652" rx="30" fill="#07152d" stroke="#ffffff" stroke-opacity=".15"/>
    <rect x="58" y="62" width="72" height="72" rx="22" fill="#ffffff"/>
    <image href="/logo-icon.png" x="70" y="74" width="48" height="48" preserveAspectRatio="xMidYMid meet"/>
    <text x="146" y="82" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">PipNest Markets</text>
    <text x="146" y="111" fill="#60a5fa" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Install the trader app</text>
    <text x="58" y="188" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900">Trader</text>
    <text x="58" y="234" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900">Dashboard</text>
    <text x="58" y="276" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Track challenges, accounts,</text>
    <text x="58" y="302" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">KYC and payout progress.</text>
    <rect x="58" y="344" width="304" height="112" rx="20" fill="url(#card)" stroke="#93c5fd" stroke-opacity=".18"/>
    <rect x="78" y="370" width="64" height="64" rx="18" fill="#2563eb" opacity=".35"/>
    <path d="M98 401h24M110 389v24" stroke="#bfdbfe" stroke-width="8" stroke-linecap="round"/>
    <text x="162" y="391" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="900">Challenge status</text>
    <text x="162" y="421" fill="#bfdbfe" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Active, pending and paid</text>
    <rect x="58" y="478" width="144" height="118" rx="20" fill="url(#card)" stroke="#93c5fd" stroke-opacity=".18"/>
    <text x="78" y="518" fill="#60a5fa" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="900">PAYOUTS</text>
    <text x="78" y="560" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900">$0.00</text>
    <rect x="218" y="478" width="144" height="118" rx="20" fill="url(#card)" stroke="#93c5fd" stroke-opacity=".18"/>
    <text x="238" y="518" fill="#60a5fa" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="900">KYC</text>
    <text x="238" y="560" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">Ready</text>
