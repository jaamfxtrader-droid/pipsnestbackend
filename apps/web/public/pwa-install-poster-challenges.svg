    <text x="90" y="618" fill="#052e16" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900">Pay now</text>
    <rect x="210" y="584" width="152" height="54" rx="17" fill="#ffffff" opacity=".12" stroke="#ffffff" stroke-opacity=".18"/>
    <text x="240" y="618" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900">Check status</text>
