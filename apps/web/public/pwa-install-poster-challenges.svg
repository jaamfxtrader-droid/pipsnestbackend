    <rect x="34" y="36" width="352" height="652" rx="30" fill="#062233" stroke="#ffffff" stroke-opacity=".15"/>
    <rect x="58" y="62" width="72" height="72" rx="22" fill="#ffffff"/>
    <image href="/logo.png" x="70" y="74" width="48" height="48" preserveAspectRatio="xMidYMid meet"/>
    <text x="146" y="84" fill="#dff7ff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">PipNest Markets</text>
    <text x="146" y="112" fill="#67e8f9" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Smooth challenge checkout</text>
    <text x="58" y="184" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Challenge</text>
    <text x="58" y="228" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Checkout</text>
