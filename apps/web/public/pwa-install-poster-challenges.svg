    <text x="58" y="296" fill="#cffafe" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">or secure crypto payments.</text>
    <rect x="58" y="344" width="304" height="96" rx="20" fill="url(#panel)" stroke="#67e8f9" stroke-opacity=".2"/>
    <text x="80" y="382" fill="#67e8f9" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="900">ELITE CHALLENGE</text>
    <text x="80" y="414" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900">$10,000</text>
