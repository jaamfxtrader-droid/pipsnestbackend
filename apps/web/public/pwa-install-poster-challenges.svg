<svg xmlns="http://www.w3.org/2000/svg" width="420" height="720" viewBox="0 0 420 720" role="img" aria-label="PipNest Markets challenge checkout install preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#042f2e"/>
      <stop offset=".5" stop-color="#075985"/>
      <stop offset="1" stop-color="#071126"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#00111f" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect width="420" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="58" cy="98" r="126" fill="#22d3ee" opacity=".18"/>
  <circle cx="356" cy="568" r="178" fill="#2563eb" opacity=".18"/>
